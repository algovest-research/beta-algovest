small positive but must be viewed in the context of the severe bear market. The 50 SMA has been falling continuously since March, though the pace of decline has slowed recently — from ₹318 to ₹304 over 2 months.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKey Observation:\u003c/strong\u003e The 50 SMA (₹304.16) is well below the 200 SMA (₹359.69). This is a textbook \u003cstrong\u003ebearish alignment\u003c/strong\u003e — there has been no golden cross, and in fact, the gap between them is still massive (~₹55 or ~15%). This strongly confirms the long-term downtrend.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. SHORT-TERM TREND \u0026amp; MOMENTUM\u003c/h2\u003e\n\u003ch3\u003e10-Period EMA (close_10_ema)\u003c/h3\u003e\n\u003cp\u003eThe 10 EMA is at \u003cstrong\u003e₹307.21\u003c/strong\u003e (May 15) and has been rising from a low of ~₹295.08 (Apr 6) to current levels. The 10 EMA crossed above the 50 SMA recently, which is a short-term bullish signal. The price is also trading \u003cstrong\u003eabove the 10 EMA\u003c/strong\u003e (₹309.45 \u0026gt; ₹307.21), indicating positive short-term momentum.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCrucial pattern:\u003c/strong\u003e The 10 EMA had formed a V-shaped recovery from the Apr 6 low (₹295) to now (₹307), showing a \u003cstrong\u003eshort-term recovery rally\u003c/strong\u003e within the larger bear trend.\u003c/p\u003e\n\u003ch3\u003ePrice Action Analysis\u003c/h3\u003e\n\u003cp\u003eLooking at the full year of data:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePeak price:\u003c/strong\u003e ~₹427 (May 27, 2025, pre-dividend adjustment)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAfter dividend of ₹7.85 on May 28, 2025:\u003c/strong\u003e Sharp gap down to ~₹411\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eContinued decline:\u003c/strong\u003e Through H2 2025, the stock gradually declined from ~₹420 to ~₹390\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJan 1, 2026 collapse:\u003c/strong\u003e A massive gap down from ~₹394 to ₹356.38 (on massive volume of 282M shares) — a catastrophic event\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFurther decline:\u003c/strong\u003e Continued to fall to a \u003cstrong\u003elow of ~₹287.70\u003c/strong\u003e (Mar 30, 2026) — the ultimate bottom of the bear move\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecovery:\u003c/strong\u003e From March 30 low, the stock rallied to \u003cstrong\u003e₹316.25\u003c/strong\u003e (Apr 29), then pulled back to \u003cstrong\u003e₹300.70\u003c/strong\u003e (May 12), and is now back at \u003cstrong\u003e₹309.45\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e3. MACD ANALYSIS (Momentum)\u003c/h2\u003e\n\u003ch3\u003eMACD Line (macd)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent:\u003c/strong\u003e \u003cstrong\u003e0.53\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eThe MACD line has recovered impressively from a deep low of \u003cstrong\u003e-7.56\u003c/strong\u003e (Mar 30) to positive territory (crossed above zero around May 5-6)\u003c/li\u003e\n\u003cli\u003eThis is an extremely powerful \u003cstrong\u003ebearish-to-bullish MACD crossover\u003c/strong\u003e signal\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eMACD Signal Line (macds)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent:\u003c/strong\u003e \u003cstrong\u003e0.84\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eThe signal line is still above the MACD line, meaning the \u003cstrong\u003eMACD histogram is negative\u003c/strong\u003e (-0.31)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eMACD Histogram (macdh)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent:\u003c/strong\u003e \u003cstrong\u003e-0.31\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eThe histogram peaked at \u003cstrong\u003e+2.16\u003c/strong\u003e (Apr 21-22) and has been declining since, now back to negative territory (-0.31)\u003c/li\u003e\n\u003cli\u003eHowever, we recently saw the histogram turn positive from May 4-8 (Apr 30 signal line crossover), and it\u0026#39;s now slightly negative again — indicating \u003cstrong\u003eoscillating momentum\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eKey MACD Observation:\u003c/strong\u003e The MACD line crossed above the signal line on ~Apr 28-29 (bullish crossover). However, the histogram shows waning momentum recently (negative again), suggesting the rally may be losing steam. This is a \u003cstrong\u003epotential bearish divergence\u003c/strong\u003e signal if price makes new highs while MACD momentum fades.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e4. RSI (Relative Strength Index)\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent RSI:\u003c/strong\u003e \u003cstrong\u003e53.83\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eThe RSI has recovered from deeply oversold territory:\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMar 23:\u003c/strong\u003e 29.19 (oversold)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMar 30:\u003c/strong\u003e 30.87 (near oversold)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApr 2:\u003c/strong\u003e 37.73\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApr 6:\u003c/strong\u003e 40.35\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent:\u003c/strong\u003e 53.83 (neutral zone)\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eThe RSI moved above 50 (bullish threshold) on ~Apr 17 and has oscillated around 50-62 since\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecent dip:\u003c/strong\u003e From 62.77 (Apr 29) down to 41.75 (May 12), then recovery to 53.83 (May 15)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInterpretation:\u003c/strong\u003e Neutral territory. Not overbought nor oversold. The RSI\u0026#39;s ability to hold above 40 during the May 12 dip is mildly supportive of the recovery thesis.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. BOLLINGER BANDS (Volatility)\u003c/h2\u003e\n\u003ch3\u003eBollinger Upper Band (boll_ub)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent:\u003c/strong\u003e \u003cstrong\u003e₹316.58\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eSteadily declining from ~₹332 (Mar 18) to current, reflecting lower highs in the band\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eBollinger Lower Band (boll_lb)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent:\u003c/strong\u003e \u003cstrong\u003e₹299.13\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eHas been rising from ~₹285 (early April) — this is constructive, showing that the lower boundary is firming up\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eBollinger Interpretation\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eThe bands are narrowing — the upper band is declining while the lower band is rising, indicating that \u003cstrong\u003evolatility is compressing\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eCurrent price (₹309.45) is near the middle of the bands, with the band width being approximately ₹17.45\u003c/li\u003e\n\u003cli\u003eA narrowing band often precedes a significant breakout move — either direction\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e6. ATR (Average True Range) — Volatility Gauge\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent ATR:\u003c/strong\u003e \u003cstrong\u003e5.05\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eATR has been steadily declining from ~\u003cstrong\u003e6.73\u003c/strong\u003e (Apr 1-2) to current 5.05\u003c/li\u003e\n\u003cli\u003eThis confirms the \u003cstrong\u003evolatility contraction\u003c/strong\u003e observed in Bollinger Bands\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUsage:\u003c/strong\u003e For stop-loss placement, a 1.5x ATR would be ~₹7.58. Current daily range expectation is ~₹5.05\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e7. VWMA (Volume-Weighted Moving Average)\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent VWMA:\u003c/strong\u003e \u003cstrong\u003e₹309.27\u003c/strong\u003e (May 15)\u003c/li\u003e\n\u003cli\u003eThe price (₹309.45) is trading essentially \u003cstrong\u003eat the VWMA\u003c/strong\u003e — a neutral signal\u003c/li\u003e\n\u003cli\u003eVWMA has risen from a low of ~₹295.95 (Apr 15) to current ₹309.27, confirming the recovery\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKey insight:\u003c/strong\u003e Price has been oscillating around VWMA recently, indicating a lack of clear directional conviction from volume-weighted participants\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e8. SYNTHESIS \u0026amp; TRADING IMPLICATIONS\u003c/h2\u003e\n\u003ch3\u003eBearish Factors (Risks)\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eMassive structural downtrend:\u003c/strong\u003e Price is ~14% below the 200 SMA (₹359.69), confirming a powerful bear market\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e200 SMA still declining:\u003c/strong\u003e From ~₹379.97 (Mar) to ~₹359.69 — no flattening yet\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMACD histogram turning negative\u003c/strong\u003e (-0.31) after a positive period — momentum fading\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeath cross scenario:\u003c/strong\u003e 50 SMA (₹304) far below 200 SMA (₹359), no convergence yet\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJan 1, 2026 gap-down catastrophe:\u003c/strong\u003e The stock lost ~10% in a single day on enormous volume (282M shares), shattering the prior base\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eBullish Factors (Opportunities)\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003ePrice above 10 EMA (₹307.21) and 50 SMA (₹304.16)\u003c/strong\u003e — short-term bullish alignment\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRSI recovered from oversold\u003c/strong\u003e (29.19 on Mar 23) to neutral (53.83) — no longer in panic territory\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMACD line crossed above zero\u003c/strong\u003e — positive momentum on a medium-term basis\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVolatility compression\u003c/strong\u003e (narrowing Bollinger Bands, declining ATR) often precedes a significant move — could be to the upside if resistance breaks\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHigher low formed:\u003c/strong\u003e The Mar 30 low of ₹287.70 was not violated during the May 12 dip to ₹300.70 — a potential higher low\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVWMA rising steadily\u003c/strong\u003e from ~₹296 to ~₹309 — volume-weighted price action supports the recovery\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eKey Price Levels\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eLevel\u003c/th\u003e\n\u003cth\u003eValue\u003c/th\u003e\n\u003cth\u003eSignificance\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eResistance\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e~₹312-₹317\u003c/td\u003e\n\u003ctd\u003eBollinger Upper Band \u0026amp; Apr 29 high (₹316.25)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMajor Resistance\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e~₹327-₹332\u003c/td\u003e\n\u003ctd\u003eFeb/Mar 2026 swing highs \u0026amp; gap fill zone\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCritical Resistance\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e~₹360\u003c/td\u003e\n\u003ctd\u003e200 SMA — ultimate bear/bull line\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSupport\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e~₹304-₹307\u003c/td\u003e\n\u003ctd\u003e50 SMA \u0026amp; 10 EMA convergence zone\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMajor Support\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e~₹300-₹301\u003c/td\u003e\n\u003ctd\u003eMay 12 low\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCritical Support\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e~₹287-₹290\u003c/td\u003e\n\u003ctd\u003eMar 30 low — the bear market bottom\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003eFINAL TRANSACTION PROPOSITION\u003c/h2\u003e\n\u003cp\u003eGiven the analysis above:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFINAL TRANSACTION PROPOSAL: HOLD\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRationale:\u003c/strong\u003e The stock shows a short-term recovery within a powerful long-term bear market. While there are encouraging signs (MACD above zero, RSI neutral, higher lows forming above ₹300), the structural context is overwhelmingly bearish with the stock trading ~14% below the declining 200 SMA. The narrowing Bollinger Bands and fading MACD histogram suggest the recovery rally is losing momentum. A trader should \u003cstrong\u003ewait\u003c/strong\u003e for either (a) a decisive breakout above ₹317 (Bollinger UB resistance) with volume confirmation, or (b) a re-test of the ₹287-290 support before committing to a position. The risk/reward is not compelling enough for an outright BUY, and the long-term trend is too bearish to SELL into what could be a bottoming process.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eSummary Table\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eIndicator\u003c/th\u003e\n\u003cth\u003eCurrent Value\u003c/th\u003e\n\u003cth\u003eSignal\u003c/th\u003e\n\u003cth\u003eInsight\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eClose (May 15)\u003c/str rong\u003e May 17, 2026  \u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e1. Executive Summary\u003c/h2\u003e\n\u003cp\u003eITC Ltd (ITC.NS) has experienced a mixed week characterized by anticipation around earnings season, the spin-off dynamics with ITC Hotels, and valuation reset concerns. Key headlines revolve around the company\u0026#39;s FMCG-conglomerate status, its cigarette business resilience, and the performance of its hotel subsidiary post-demerger. The sentiment is cautiously optimistic with notable undertones of valuation recalibration.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. Key News Headlines \u0026amp; Analysis\u003c/h2\u003e\n\u003ch3\u003eA. ITC Hotels Q4 Results (May 15, 2026) – Positive Catalyst\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSource:\u003c/strong\u003e Zee Business\u003cbr\u003eITC Hotels reported a \u003cstrong\u003e34% rise in net profit to ₹317 crore\u003c/strong\u003e for Q4 FY26 and declared a final dividend. This is a significant positive development as the hotels business (now separately listed) demonstrates strong post-pandemic recovery. The strong performance of ITC Hotels indirectly benefits ITC Ltd as the parent still holds a majority stake, and the successful demerger unlocks value for shareholders.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eImplication:\u003c/strong\u003e Positive for ITC.NS. The hotels vertical showing robust earnings growth validates the demerger strategy and adds to the overall group value.\u003c/p\u003e\n\u003ch3\u003eB. ITC Ltd Stock – \u0026quot;FMCG Heavyweight Navigates Valuation Reset and Mixed Momentum\u0026quot; (May 16)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSource:\u003c/strong\u003e AD HOC NEWS\u003cbr\u003eThis article highlights the core debate surrounding ITC: despite strong fundamentals, the stock faces a \u0026quot;valuation reset.\u0026quot; Key points:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eITC is a diversified FMCG powerhouse with dominant positions in cigarettes, packaged foods (Aashirvaad, Sunfeast, Bingo), and hospitality.\u003c/li\u003e\n\u003cli\u003eHowever, regulatory overhang on tobacco, shifting consumer preferences, and the need for growth in non-cigarette FMCG segments create \u0026quot;mixed momentum.\u0026quot;\u003c/li\u003e\n\u003cli\u003eThe stock may be undergoing a re-rating as investors reassess the sum-of-the-parts valuation post the hotels demerger.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eImplication:\u003c/strong\u003e Cautious to Neutral. The stock is not out of the woods regarding valuation compression, but long-term value remains intact.\u003c/p\u003e\n\u003ch3\u003eC. Equitypandit Outlook for the Week (May 18-22, 2026)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSource:\u003c/strong\u003e Equitypandit\u003cbr\u003eThe technical outlook for the upcoming week suggests traders should watch key support and resistance levels. Typically Equitypandit provides technical analysis including moving averages, RSI, and volume patterns. The forward-looking guidance suggests institutional interest remains.\u003c/p\u003e\n\u003ch3\u003eD. ITC.NS Stock Rises 0.02% Ahead of May 14 Earnings (May 9)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSource:\u003c/strong\u003e Meyka\u003cbr\u003eThe stock remained relatively flat (+0.02%) ahead of earnings, indicating cautious positioning by traders ahead of results. This neutral price action suggests the market was waiting for catalysts.\u003c/p\u003e\n\u003ch3\u003eE. Cigarette Stocks Surge – ITC, Godfrey Phillips Jump Up to 11% (Feb 6, 2026 – Historical Reference)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSource:\u003c/strong\u003e Meyka\u003cbr\u003eAlthough older news, it indicates the cigarette segment\u0026#39;s pricing power. Godfrey Phillips\u0026#39; 31% rally on price hikes (Feb 20) signals that the entire cigarette industry enjoys pricing power, which bodes well for ITC\u0026#39;s core cash-cow business.\u003c/p\u003e\n\u003ch3\u003eF. Indian Shares Start 2026 on a Subdued Note – Auto Rally Offsets Decline in ITC (Dec 31, 2025 – Historical)\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eSource:\u003c/strong\u003e Reuters\u003cbr\u003eITC was a drag on Indian benchmarks early in the year, suggesting the stock has been underperforming relative to other sectors (e.g., auto) for a prolonged period.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. Social Media \u0026amp; Sentiment Analysis\u003c/h2\u003e\n\u003cp\u003eBased on the news aggregator and available data, the following sentiment themes emerge:\u003c/p\u003e\n\u003ch3\u003ePositive Sentiment Drivers:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eITC Hotels Profit Surge (34%):\u003c/strong\u003e Social media and news commentary around the hotel subsidiary\u0026#39;s strong showing has been upbeat.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDividend Declaration:\u003c/strong\u003e Final dividend announcements are typically well-received by India\u0026#39;s retail investor base, who favor dividend-yielding stocks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDefensive FMCG Play:\u003c/strong\u003e Amid global tariff uncertainty and market volatility (referenced in Reuters articles from July 2025), ITC is seen as a safe-haven defensive stock.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eNegative Sentiment Drivers:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eValuation Reset Narrative:\u003c/strong\u003e Analysts and news outlets are debating whether ITC\u0026#39;s valuation needs to be reset lower as growth in non-cigarette FMCG lags peers like HUL, Nestlé, and Britannia.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegulatory Overhang on Tobacco:\u003c/strong\u003e Persistent concerns about tighter tobacco regulations, higher GST, and health warnings continue to weigh on sentiment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnderperformance vs. Broader Market:\u003c/strong\u003e Relative underperformance compared to auto stocks and other high-growth sectors has frustrated momentum traders.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eNeutral/Balanced Sentiment:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSum-of-the-Parts Debate:\u003c/strong\u003e Post-demerger of ITC Hotels, there is ongoing discussion about the fair value of ITC\u0026#39;s remaining businesses (cigarettes, FMCG, paperboards, agri-business).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInstitutional Positioning:\u003c/strong\u003e The relatively flat price action (+0.02%) ahead of earnings suggests institutional investors are cautiously positioned, waiting for clarity.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e4. Technical \u0026amp; Market Implications\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eFactor\u003c/th\u003e\n\u003cth\u003eObservation\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003ePre-earnings price action\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eNear-flat (+0.02%), indicating neutrality ahead of catalysts\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eRecent volatility pattern\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003ePreviously saw sharp moves (e.g., -1.91% after-hours on Jan 27; +11% surge in Feb) suggesting the stock reacts strongly to earnings and news\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eTrading volume\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eLikely elevated during earnings weeks; watch for volume confirmation on breakouts\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSupport/Resistance\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eEquitypandit outlook for May 18-22 week will be critical for short-term traders\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/ listed entity.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNormalized Net Profit (FY25)\u003c/strong\u003e: Excluding the one-time other income, normalized net profit would be approximately ₹19,000-20,500 Cr, implying a normal EPS of ~₹15-16, similar to FY24 levels.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTTM EPS of ₹27.98 is misleadingly high\u003c/strong\u003e due to this one-time gain.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eDividend Payout\u003c/strong\u003e: The payout ratio has historically been very high (54-101%), reflecting ITC\u0026#39;s strong cash generation. In FY25, the payout dropped to 52% — but this is on the inflated profit figure.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eQuarterly Trends (Recent)\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eQuarter\u003c/th\u003e\n\u003cth\u003eSales (₹ Cr)\u003c/th\u003e\n\u003cth\u003eOPM %\u003c/th\u003e\n\u003cth\u003eNet Profit\u003c/th\u003e\n\u003cth\u003eEPS\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eJun 2024\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e17,778\u003c/td\u003e\n\u003ctd\u003e37%\u003c/td\u003e\n\u003ctd\u003e5,177\u003c/td\u003e\n\u003ctd\u003e4.08\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eSep 2024\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e19,990\u003c/td\u003e\n\u003ctd\u003e33%\u003c/td\u003e\n\u003ctd\u003e5,054\u003c/td\u003e\n\u003ctd\u003e3.99\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eDec 2024\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e18,790\u003c/td\u003e\n\u003ctd\u003e34%\u003c/td\u003e\n\u003ctd\u003e5,013\u003c/td\u003e\n\u003ctd\u003e3.94\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMar 2025\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u
