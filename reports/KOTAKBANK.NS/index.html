al on a long-term horizon.\u003c/li\u003e\n\u003cli\u003eThe 200 SMA has also been \u003cstrong\u003edeclining steadily\u003c/strong\u003e from ~₹420.14 (Feb 6) to ₹407.17 (May 15), confirming that the \u003cstrong\u003elong-term trend has turned south\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eGolden/Death Cross Analysis:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe 50 SMA (₹376.88) crossed \u003cstrong\u003ebelow\u003c/strong\u003e the 200 SMA (₹407.17) on approximately \u003cstrong\u003eMarch 10, 2026\u003c/strong\u003e — a \u003cstrong\u003eDeath Cross\u003c/strong\u003e formation. This is a strongly bearish long-term signal.\u003c/li\u003e\n\u003cli\u003eAt ₹30 below the 200 SMA, the gap has widened from the initial cross, suggesting \u003cstrong\u003econtinued bearish pressure\u003c/strong\u003e with no reversal of the death cross.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e10 EMA (Short-Term Momentum):\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCurrent value (May 15): \u003cstrong\u003e₹380.33\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003ePrice (₹387.05) is \u003cstrong\u003eabove the 10 EMA\u003c/strong\u003e, indicating \u003cstrong\u003eshort-term bullish momentum\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe 10 EMA has \u003cstrong\u003ecurved upward\u003c/strong\u003e from a low of ~₹363.73 (April 6) to ₹380.33 (May 15), forming a \u003cstrong\u003eshort-term uptrend channel\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThis is a positive sign but the 10 EMA remains well below both the 50 and 200 SMAs, so this is a \u003cstrong\u003ecounter-trend bounce within a larger downtrend\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eMA Hierarchy (May 15):\u003c/strong\u003e\u003c/h3\u003e\n\u003cpre\u003e\u003ccode\u003ePrice (₹387.05) \u0026gt; 10 EMA (₹380.33) \u0026gt; 50 SMA (₹376.88) \u0026gt; ... \u0026gt;\u0026gt; 200 SMA (₹407.17)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eThe current arrangement shows \u003cstrong\u003eshort-term bullish alignment\u003c/strong\u003e (price \u0026gt; 10 EMA \u0026gt; 50 SMA) but \u003cstrong\u003elong-term bearish misalignment\u003c/strong\u003e (all \u0026lt; 200 SMA).\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003e3. MACD Analysis\u003c/strong\u003e\u003c/h2\u003e\n\u003ch3\u003e\u003cstrong\u003eKey Observations:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMACD Line (May 15):\u003c/strong\u003e \u003cstrong\u003e+1.01\u003c/strong\u003e — \u003cstrong\u003ePositive for the first time in nearly 3 months\u003c/strong\u003e, having been deeply negative through March-April.\u003c/li\u003e\n\u003cli\u003eThe MACD line was as low as \u003cstrong\u003e-14.86\u003c/strong\u003e on March 23, representing \u003cstrong\u003ea massive recovery of ~16 points\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe MACD crossed above the zero line around \u003cstrong\u003eMay 5-6\u003c/strong\u003e, marking a \u003cstrong\u003ebullish MACD zero-line crossover\u003c/strong\u003e — a significant momentum shift.\u003c/li\u003e\n\u003cli\u003eThe MACD line has been \u003cstrong\u003erising consistently\u003c/strong\u003e since late March, indicating \u003cstrong\u003ebuilding upside momentum\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eMACD Divergence Check:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBullish Divergence:\u003c/strong\u003e During March-April, price made lower lows (363.35 on March 19 → 351.65 on March 30 → 345.50 on April 2), but the MACD line was \u003cstrong\u003emaking higher lows\u003c/strong\u003e (-14.86 on March 23 → -13.95 on April 2 → -10.50 on April 8). This is a \u003cstrong\u003eclassic bullish divergence\u003c/strong\u003e that often precedes meaningful reversals — and indeed price has recovered ~₹40 from the April lows.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eSignal Crossover:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eWhile the MACD has risen impressively, we need to also check the MACD signal and histogram for a potential signal-line crossover confirmation. The fact that MACD is now \u003cstrong\u003epositive\u003c/strong\u003e is a critical milestone suggesting the short-term tide has turned.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003e4. RSI – Momentum Gauge\u003c/strong\u003e\u003c/h2\u003e\n\u003ch3\u003e\u003cstrong\u003eKey Observations:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRSI (May 15):\u003c/strong\u003e \u003cstrong\u003e57.89\u003c/strong\u003e — In neutral-to-bullish territory, above 50.\u003c/li\u003e\n\u003cli\u003eThe RSI \u003cstrong\u003ebottomed at 25.12\u003c/strong\u003e on March 23 (deeply oversold) and has been recovering steadily.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOversold Recovery:\u003c/strong\u003e The RSI stayed below 30 from March 13 to April 1, indicating a \u003cstrong\u003esustained oversold condition\u003c/strong\u003e — which often precedes mean-reversion rallies.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo overbought condition:\u003c/strong\u003e The RSI has not touched 70 (overbought), suggesting \u003cstrong\u003eroom for further upside\u003c/strong\u003e before hitting resistance.\u003c/li\u003e\n\u003cli\u003eThe current reading of 57.89 is healthy — not suggesting exhaustion.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eDivergence Analysis:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBullish RSI divergence\u003c/strong\u003e confirmed: Price made lower lows from late March to early April; RSI made higher lows — a textbook reversal signal that has played out.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003e5. Bollinger Bands – Volatility Envelope\u003c/strong\u003e\u003c/h2\u003e\n\u003ch3\u003e\u003cstrong\u003eKey Observations (May 15):\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBollinger Middle (20 SMA):\u003c/strong\u003e ₹378.38\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBollinger Upper:\u003c/strong\u003e ₹387.76\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBollinger Lower:\u003c/strong\u003e ₹369.00\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrice:\u003c/strong\u003e ₹387.05 — \u003cstrong\u003etouching the upper band!\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eInterpretation:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003ePrice contacting the upper Bollinger Band suggests the stock is \u003cstrong\u003eextended to the upside\u003c/strong\u003e on a short-term basis. This can mean:\u003col\u003e\n\u003cli\u003eA strong, trending move (bullish continuation), OR\u003c/li\u003e\n\u003cli\u003ePotential \u003cstrong\u003eoverextension\u003c/strong\u003e and a pullback toward the middle band.\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBand Width:\u003c/strong\u003e The bands have \u003cstrong\u003enarrowed significantly\u003c/strong\u003e from the extreme width in early March (Upper: ~448, Lower: ~365) to now (Upper: ~387.8, Lower: ~369). This contraction suggests a \u003cstrong\u003eperiod of consolidation\u003c/strong\u003e after a large selloff.\u003c/li\u003e\n\u003cli\u003eA band squeeze often precedes a \u003cstrong\u003evolatility expansion\u003c/strong\u003e — either a breakout continuation or a reversal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eHistorical Context:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIn the March selloff, price \u003cstrong\u003erode the lower band\u003c/strong\u003e during the capitulation phase (Mar 13-23).\u003c/li\u003e\n\u003cli\u003ePrice broke above the middle band around \u003cstrong\u003eApril 15-17\u003c/strong\u003e and has remained above it since, confirming a short-term bullish phase.\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003efirst touch of the upper band\u003c/strong\u003e since the April recovery warrants close attention.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003e6. ATR – Volatility Measurement\u003c/strong\u003e\u003c/h2\u003e\n\u003ch3\u003e\u003cstrong\u003eKey Observations:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eATR (May 15):\u003c/strong\u003e \u003cstrong\u003e9.55\u003c/strong\u003e — Elevated but declining from recent peaks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePeak ATR:\u003c/strong\u003e ~10.85 on April 9 (during the volatile selloff and recovery).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLow ATR:\u003c/strong\u003e ~8.31 on Feb 26 (prior to the breakdown).\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eImplications:\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eCurrent ATR of \u003cstrong\u003e₹9.55\u003c/strong\u003e (2.47% of current price) represents \u003cstrong\u003eelevated but moderating volatility\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eFor reference, stock has moved an average of ~₹9.6 per day recently.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStop-loss guidance:\u003c/strong\u003e A 1.5x-2x ATR stop would be ₹14-19, meaning stop-loss levels should be placed around \u003cstrong\u003e₹368-373\u003c/strong\u003e for long positions — which interestingly aligns with the lower Bollinger Band (₹369).\u003c/li\u003e\n\u003cli\u003eATR is \u003cstrong\u003emoderating downward\u003c/strong\u003e, which supports the idea that the wild March-April swings are settling into a calmer range.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e\u003cstrong\u003e7. rong\u003eDeath Cross\u003c/strong\u003e in place (50 SMA \u0026lt; 200 SMA)\u003c/li\u003e\n\u003cli\u003ePrice ~5% \u003cstrong\u003ebelow\u003c/strong\u003e the 200 SMA (long-term bearish)\u003c/li\u003e\n\u003cli\u003eThe stock fell from ~₹460 (Oct 2025 highs) to ₹345 (April 2026) — a \u003cstrong\u003e25% decline\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eThe 200 SMA is still declining, suggesting no long-term bottom has been established\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eThe Medium Picture (1-3 month view): NEUTRAL-to-BULLISH\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e50 SMA still declining but price has crossed above it\u003c/li\u003e\n\u003cli\u003eMACD turned positive for the first time in 3 months\u003c/li\u003e\n\u003cli\u003eBullish RSI and MACD divergences have played out\u003c/li\u003e\n\u003cli\u003eStock recovered from 345 to 387 (~12.2% gain from April lows)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eThe Short Picture (1-4 week view): CAUTIOUSLY BULLISH\u003c/strong\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003ePrice at upper Bollinger Band — may be overextended\u003c/li\u003e\n\u003cli\u003e10 EMA trending up with price above it\u003c/li\u003e\n\u003cli\u003eRSI at 57.9 — room to run but not overbought\u003c/li\u003e\n\u003cli\u003eATR declining suggests volatility contraction\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eKey Risk Factors:\u003c/strong\u003e\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eUpper Bollinger Band resistance\u003c/strong\u003e at ₹387.76 — price is right at it\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e200 SMA resistance\u003c/strong\u003e at ~₹407 — this is the \u003cstrong\u003emajor overhead resistance\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eThe 50 SMA is still declining and needs to flatten/rise to confirm a sustainable uptrend\u003c/li\u003e\n\u003cli\u003eThe recovery so far could /strong\u003e\u003c/td\u003e\n\u003ctd\u003e14,593\u003c/td\u003e\n\u003ctd\u003e15,768\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e40,691\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e+158% YoY\u003c/strong\u003e — excellent cash generation\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCFO/OP Ratio\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e236%\u003c/td\u003e\n\u003ctd\u003e139%\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e276%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eStrong cash conversion\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003ch3\u003eCash Flow Highlights:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOperating cash flow more than doubled\u003c/strong\u003e to ₹41,727 Cr — the highest in the bank\u0026#39;s history.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFree Cash Flow surged\u003c/strong\u003e to ₹40,691 Cr, signaling strong core business cash generation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe CFO/OP ratio of 276%\u003c/strong\u003e indicates the bank is converting its operating profits into cash very efficiently.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e6. Asset Quality (Gross \u0026amp; Net NPA)\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eQuarter\u003c/th\u003e\n\u003cth\u003eGross NPA %\u003c/th\u003e\n\u003cth\u003eNet NPA %\u003c/th\u003e\n\u003cth\u003eTrend\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003eMar 2023\u003c/td\u003e\n\u003ctd\u003e1.76%\u003c/td\u003e\n\u003ctd\u003e0.41%\u003c/td\u003e\n\u003ctd\u003eElevated\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eJun 2023\u003c/td\u003e\n\u003ctd\u003e1.75%\u003c/td\u003e\n\u003ctd\u003e0.43%\u003c/td\u003e\n\u003ctd\u003e-\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eSep 2023\u003c/td\u003e\n\u003ctd\
