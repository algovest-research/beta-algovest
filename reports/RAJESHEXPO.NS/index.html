e price is now \u003cstrong\u003eabove\u003c/strong\u003e the 50 SMA (₹121.99 vs ₹115.43), which is interesting — this is the \u003cstrong\u003efirst time since late March\u003c/strong\u003e that price has reclaimed and stayed above the 50 SMA. This signals a \u003cstrong\u003epotential short-to-medium term trend reversal\u003c/strong\u003e from the extreme lows.\u003c/p\u003e\n\u003ch3\u003eShort-Term Momentum (10 EMA)\u003c/h3\u003e\n\u003cp\u003eThe \u003cstrong\u003e10 EMA\u003c/strong\u003e has risen sharply from ~₹93 in late March to \u003cstrong\u003e₹121.29\u003c/strong\u003e now. The price is \u003cstrong\u003etrading just above\u003c/strong\u003e the 10 EMA, indicating short-term bullish momentum. The 10 EMA has crossed above the 50 SMA very recently (a golden cross of sorts on the short-term side).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKey Insight:\u003c/strong\u003e There is a \u003cstrong\u003eclear bullish convergence\u003c/strong\u003e forming — price \u0026gt; 10 EMA \u0026gt; 50 SMA (on the short-term), but all are \u003cstrong\u003estill deeply below\u003c/strong\u003e the 200 SMA. This creates a classic \u0026quot;recovery within a downtrend\u0026quot; structure. The 50 SMA is now acting as \u003cstrong\u003esupport\u003c/strong\u003e near ₹115.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e2. MOMENTUM ANALYSIS — MACD \u0026amp; RSI\u003c/h2\u003e\n\u003ch3\u003eMACD\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMACD Line:\u003c/strong\u003e +2.02 (as of May 8)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSignal Line:\u003c/strong\u003e +1.99\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHistogram:\u003c/strong\u003e +0.026\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe MACD tells a remarkable story. It \u003cstrong\u003ebottomed\u003c/strong\u003e at -18.42 on March 30 and has been \u003cstrong\u003erallying sharply\u003c/strong\u003e ever since. The MACD line crossed above the signal line around \u003cstrong\u003eApril 1-2\u003c/strong\u003e, marking a textbook bullish crossover. Since then:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe histogram has been consistently positive (green bars), confirming bullish momentum.\u003c/li\u003e\n\u003cli\u003eThe MACD line has surged from -18.42 to +2.02 — a massive 20+ point recovery.\u003c/li\u003e\n\u003cli\u003eHowever, the histogram has \u003cstrong\u003eflattened rapidly\u003c/strong\u003e in the last few days — from 1.15 on May 1 to just 0.026 on May 8. This suggests \u003cstrong\u003emomentum is stalling\u003c/strong\u003e and a potential bearish crossover (MACD line crossing back below the signal line) could be imminent if price doesn\u0026#39;t rally soon.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eRSI\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCurrent RSI:\u003c/strong\u003e \u003cstrong\u003e54.13\u003c/strong\u003e (May 8)\u003c/li\u003e\n\u003cli\u003eThe RSI was deeply oversold (14-20 range) from mid-March to late March during the crash to ~₹80.\u003c/li\u003e\n\u003cli\u003eIt recovered sharply, peaking around \u003cstrong\u003e63.6\u003c/strong\u003e on April 16, then pulled back.\u003c/li\u003e\n\u003cli\u003eCurrently at ~54 — neutral territory, slightly bullish bias.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eKey Insight:\u003c/strong\u003e The RSI\u0026#39;s recovery from extreme oversold (14) to neutral (54) without moving into overbought territory suggests this \u003cstrong\u003erecovery has further room to run\u003c/strong\u003e. There\u0026#39;s no divergence warning yet.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e3. VOLATILITY ANALYSIS — Bollinger Bands\u003c/h2\u003e\n\u003ch3\u003eCurrent Band Positions (May 8)\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUpper Band:\u003c/strong\u003e ₹131.61\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMiddle Band (20 SMA):\u003c/strong\u003e ₹121.97\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLo 03cli\u003eThis is typical after a massive crash — the stock is settling into a consolidation phase.\u003c/li\u003e\n\u003cli\u003eDaily moves of ₹5.5 (4.5% of current price) are typical.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRisk Management:\u003c/strong\u003e A 2x ATR stop-loss would be ~₹11 (from ~₹122 to ~₹111), which aligns well with the lower Bollinger Band and 50 SMA support zone.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e5. SYNTHESIS \u0026amp; TRADING IMPLICATIONS\u003c/h2\u003e\n\u003ch3\u003eThe Big Picture\u003c/h3\u003e\n\u003cp\u003eRAJESHEXPO.NS underwent an \u003cstrong\u003eextraordinary crash\u003c/strong\u003e from ₹230 (Dec 22, 2025) to a low of \u003cstrong\u003e₹80.38\u003c/strong\u003e (March 30, 2026) — a **65% decline** in just over 3 months. Since then, a \u003cstrong\u003epowerful recovery rally\u003c/strong\u003e has brought the stock back to ~₹122 (a ~52% bounce from the lows).\u003c/p\u003e\n\u003ch3\u003eWhat\u0026#39;s Happening Now?\u003c/h3\u003e\n\u003cp\u003eThe stock is at a \u003cstrong\u003ecritical inflection point\u003c/strong\u003e:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eShort-term bullish:\u003c/strong\u003e Price \u0026gt; 10 EMA \u0026gt; 50 SMA (golden short-term setup)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLong-term bearish:\u003c/strong\u003e Price \u0026lt;\u0026lt; 200 SMA by 27%\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMomentum:\u003c/strong\u003e MACD bullish but \u003cstrong\u003erapidly decelerating\u003c/strong\u003e — histogram nearly flat\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVolatility:\u003c/strong\u003e Bollinger Squeeze forming — breakout imminent\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRSI:\u003c/strong\u003e Neutral (54) — room to run in either direction\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eThree Scenarios:\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eScenario A — Bullish Continuation (~40% probability): .\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e5. Cash Flow Analysis\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eYear\u003c/th\u003e\n\u003cth\u003eCFO\u003c/th\u003e\n\u003cth\u003eCFI\u003c/th\u003e\n\u003cth\u003eCFF\u003c/th\u003e\n\u003cth\u003eFCF\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003eMar 2021\u003c/td\u003e\n\u003ctd\u003e-10,252\u003c/td\u003e\n\u003ctd\u003e-54\u003c/td\u003e\n\u003ctd\u003e-429\u003c/td\u003e\n\u003ctd\u003e-10,278\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMar 2022\u003c/td\u003e\n\u003ctd\u003e-4\u003c/td\u003e\n\u003ctd\u003e86\u003c/td\u003e\n\u003ctd\u003e-326\u003c/td\u003e\n\u003ctd\u003e-92\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMar 2023\u003c/td\u003e\n\u003ctd\u003e457\u003c/td\u003e\n\u003ctd\u003e10\u003c/td\u003e\n\u003ctd\u003e-186\u003c/td\u003e\n\u003ctd\u003e-265\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMar 2024\u003c/td\u003e\n\u003ctd\u003e140\u003c/td\u003e\n\u003ctd\u003e70\u003c/td\u003e\n\u003ctd\u003e-33\u003c/td\u003e\n\u003ctd\u003e72\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMar 2025\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e7,738\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e-8,301\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e188\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e8,787\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eInsight:\u003c/strong\u003e FY25 operating cash flow turned strongly positive at ₹7,738 Cr (compared to just ₹140 Cr in FY24). However, investing cash flow was deeply negative (-₹8,301 Cr) due to the massive investment build-up. Free cash flow was positive ₹8,787 Cr — but this is likely due to timing of gold inventory movements rather than sustainable operational cash generation.\u003c/p\u003e\n\u003cp\u003eThe \u003cstrong\u003eCFO/OP ratio\u003c/strong\u003e was a staggering \u003cstrong\u003e4,638%\u003c/strong\u003e in FY25, meaning cash from operations was far larger than reported operating profit — typical for a gold business where inventory holding gains/losses and working capital swings dominate.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003e6. Key Ratios \u0026amp; Valuation\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eRatio\u003c/th\u003e\n\u003cth\u003eValue\u003c/th\u003e\n\u003cth\u003eAssessment\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eP/E (TTM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e21.4x\u003c/td\u003e\n\u003ctd\u003eElevated for a sub-1% margin business\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eP/B\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0.22x (122/562)\u003c/td\u003e\n\u003ctd\u003eDeep discount to book value\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eROE\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0.61%\u003c/td\u003e\n\u003ctd\u003eExtremely low — poor shareholder return\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eROCE\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1.47%\u003c/td\u003e\n\u003ctd\u003eVery low — poor capital efficiency\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eDividend Yield\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0.00%\u003c/td\u003e\n\u003ctd\u003eNo dividend paid since FY22\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eEPS (TTM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e₹5.69\u003c/td\u003e\n\u003ctd\u003eLow relative to share price\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003chr\u003e\n\u003ch2\u003e7. SWOT Analysis\u003c/h2\u003e\n\u003ch3\u003eStrengths\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGlobal leadership:\u003c/strong\u003e One of the largest gold jewelry manufacturers in the world, with established export relationships.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLow debt:\u003c/strong\u003e Borrowings of only ₹879 Cr against massive assets suggests conservative leverage.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHigh book value:\u003c/strong\u003e ₹562/share provides a theoretical floor, though the discount suggests market distrust.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRevenue scale:\u003c/strong\u003e Massive revenues (~₹7.4 lakh Cr TTM) demonstrate huge operational throughput.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eWeaknesses\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eExtremely low margins:\u003c/strong\u003e OPM of just 0.04% means any cost spike or gold price volatility can wipe out profits entirely.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eErratic earnings:\u003c/strong\u003e Net profit swung from ₹1,432 Cr (FY23) → ₹337 Cr (FY24) → ₹95 Cr (FY25) with no clear growth trajectory.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLow ROE/ROCE:\u003c/strong\u003e Returns on capital are negligible, making this a poor compounding vehicle.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo dividends:\u003c/strong\u003e Zero dividend yield since FY23 makes it unattractive for income investors.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eOpportunities\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGold price rally:\u003c/strong\u003e The recent surge in gold prices (2025-2026) could boost inventory holding gains if the company holds adequate gold stock.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRetail expansion:\u003c/strong\u003e The Shubh Jewellery retail chain could drive higher-margin branded sales.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVolume recovery:\u003c/strong\u003e The TTM sales surge suggests potential volume normalization post a weak FY24.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eThreats\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGold price volatility:\u003c/strong\u003e Sharp declines in gold prices could lead to inventory losses and margin contraction.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThin margin business model:\u003c/strong\u003e The core wholesale/export business operates on near-zero margins — a highly competitive, commoditized business.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegulatory risks:\u003c/strong\u003e Gold import/export regulations, GST, and customs duty changes can impact business.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorking capital intensity:\u003c/strong\u003e Large swings in other liabilities and assets indicate the business is extremely working-capital intensive.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003e8. Actionable Insights for Traders\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eValue Trap Alert:\u003c/strong\u003e The stock trades at a 78% discount to book value (₹122 vs ₹562 BV), which may appear enticing. However, the extremely low ROE (0.61%) and collapsing margins suggest the book value may not be fully realizable. This is a classic \u003cstrong\u003evalue trap\u003c/strong\u003e scenario — cheap for a reason.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eMomentum/Price Play:\u003c/strong\u003e The stock\u0026#39;s 52-week range is ₹80.1–₹239, indicating high price volatility. It is currently near the lower end of that range. Any positive news on gold prices or a return to FY23-level profitability could spark a re-rating. However, the fundamentals don\u0026#39;t yet support a sustained recovery.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eSector / Gold Price Proxy:\u003c/strong\u003e Rajesh Exports acts as a proxy for gold prices and the Indian jewelry export sector. If you are bullish on gold (which has been rallying in 2025-2026), the stock could benefit. But its operational leverage to gold prices is muted due to thin margins.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eWatch the Margins:\u003c/strong\u003e The single most important metric to monitor is \u003cstrong\u003eoperating margin\u003c/strong\u003e. Until the company demonstrates a sustainable move back toward 0.4-0.5% OPM (which would imply net profits of ₹2,000-3,000 Cr+ on current revenue), the stock remains speculative.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eCatalyst to Watch:\u003c/strong\u003e Any update on the ₹10,750 Cr investment book — what it\u0026#39;s invested in and whether it generates returns — could be a major re-rating catalyst.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch2\u003e9. Summary Table\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eCategory\u003c/th\u003e\n\u003cth\u003eKey Points\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eBusiness Model\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eGold jewelry manufacturing \u0026amp; retail; thin-margin, high-volume wholesale/export\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eRevenue (TTM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e₹7,41,042 Cr (explosive growth driven by gold prices)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eNet Profit (TTM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e₹168 Cr (extremely thin: 0.02% margin)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eEPS (TTM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e₹5.69\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eP/E (TTM)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e21.4x (expensive for the earnings quality)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eP/B Ratio\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0.22x (deep discount to book value of ₹562)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eROE\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e0.61% (very poor)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eROCE\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e1.47% (very poor)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eDebt Level\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eLow (₹879 Cr borrowings vs ₹37,369 Cr assets)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eDividend\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eNone (0% yield)\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eCash Flow (FY25)\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eCFO: ₹7,738 Cr positive; FCF: ₹8,787 Cr positive\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eMajor Risk\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eMargin compression to near-zero; earnings volatility; asset quality concerns\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eVerdict\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003eHOLD / CAUTIOUS\u003c/strong\u003e — Value trap risk. Deep discount to book is enticing but earnings quality is poor. Monitor margins and investment book for re-rating triggers.\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eFINAL TRANSACTION PROPOSAL: HOLD\u003c/strong\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"12:T5265,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eBull Case\u003c/h2\u003e\n\u003cp\u003eBull Analyst: Excellent. Thank you for the comprehensive data. I\u0026#39;m ready to debate.\u003c/p\u003e\n\u003cp\u003eAlright, let\u0026#39;s cut through the noise. I’ve heard the bear case. It’s the same old song: \u0026quot;Look at the technicals! It\u0026#39;s 27% below its 200-day moving average! The margins are a disaster! This is a value trap!\u0026quot;\u003c/p\u003e\n\u003cp\u003eI’ll tell you why that\u0026#39;s a shallow, rear-view mirror analysis that misses the forest for the trees. You\u0026#39;re so focused on where the stock \u003cem\u003ehas been\u003c/em\u003e that you\u0026#39;re completely ignoring where it\u0026#39;s \u003cem\u003egoing\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eLet’s build the real case for Rajesh Exports, and I’ll dismantle your bearish narrative point by point.\u003c/p\u003e\n\u003ch3\u003eThe Bull Case for RAJESHEXPO.NS\u003c/h3\u003e\n\u003cp\u003eThe thesis is simple: You are buying a deep cyclical at the very bottom of its cycle, backed by a fortress-like balance sheet, a historic gold price super-cycle, and a technical setup that screams \u0026quot;reversal.\u0026quot;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e1. The \u0026quot;Margin Disaster\u0026quot; is a Deliberate, Cyclical Trough (Not a Structural Flaw)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYou look at the 0.04% operating margin and cry \u0026quot;value trap.\u0026quot; I look at it and see the trough of a cycle, the exact point where pessimism is at its peak and the only way is up.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe Context is Key:\u003c/strong\u003e FY25 was an anomaly. The company was effectively clearing out high-cost inventory in a volatile gold market. That\u0026#39;s a one-time event, not a new normal.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCheck the Data:\u003c/strong\u003e Look at FY23. Operating profit margin was a healthy 0.48%, leading to a Net Profit of \u003cstrong\u003e₹1,432 Cr\u003c/strong\u003e. That’s a 15x earnings power on a market cap of ₹3,600 Cr. The capacity to generate massive profits is there. The FY25 results were a kitchen-sinking year. The company took the pain to clean the books, and that’s often the single best time to buy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe \u0026quot;Zero Margin\u0026quot; Argument is a Bear Trap.\u003c/strong\u003e You’re extrapolating the worst quarter into perpetuity. The Sep 2025 quarter already showed a bounce-back to ₹104 Cr net profit. The earnings trajectory is improving, not deteriorating. The margin story is a recovery story, not an obituary.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e2. The Technical \u0026quot;Death Spiral\u0026quot; is Actually a Textbook \u0026quot;Capitulation \u0026amp; Recovery\u0026quot;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYour chart analysis is technically correct, but your \u003cem\u003einterpretation\u003c/em\u003e is wrong. You see a stock 27% below its 200-day moving average. I see a stock that just completed a \u003cstrong\u003e65% crash, a 52% bounce, and now a textbook Bullish Pennant/Bollinger Squeeze\u003c/strong\u003e.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe Golden Cross:\u003c/strong\u003e You say \u0026quot;short-term bullish.\u0026quot; I say it\u0026#39;s the first time in over a year the 10 EMA has crossed above the 50 SMA. That’s the \u003cem\u003eexact\u003c/em\u003e signal traders wait for to confirm an uptrend change. The momentum has officially shifted.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe \u0026quot;Decelerating MACD\u0026quot; is a False Signal:\u003c/strong\u003e The MACD histogram flattened because the stock paused its vertical recovery to consolidate. It\u0026#39;s called a rest, not a reversal. The MACD line is still \u003cem\u003epositive\u003c/em\u003e and \u003cem\u003eabove\u003c/em\u003e the signal line. The trend is up.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe RSI is Perfect.\u003c/strong\u003e It’s at 54. That’s not stalling; that’s room to run. It blew past oversold, recovered to neutral, and is now coiling for the next leg higher. If the RSI were at 80, I’d be worried. It’s at 54. The buying pressure hasn\u0026#39;t even started.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eYou also ignore the most bullish technical signal of all: \u003cstrong\u003ePrice trading at 78% below Book Value.\u003c/strong\u003e A stock with massive assets is trading like it’s going bankrupt. That is the definition of a \u003cstrong\u003edeep value buy\u003c/strong\u003e, not a trap.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. The \u0026quot;Macro Headwind\u0026quot; of Gold Prices is Actually Your Greatest Tailwind\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYou worry about gold price volatility hurting demand. I worry about the opposite: a failure to own the world’s best inflation hedge in a time of geopolitical chaos.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUnprecedented Demand Surge:\u003c/strong\u003e The macro report from Gold.com shows a 41% earnings surprise and management citing \u0026quot;an unprecedented surge in activity.\u0026quot; Global demand for gold is exploding. Rajesh Exports is the largest exporter in India. They are the pipeline for this demand.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe \u0026quot;Safe-Haven Rotation\u0026quot; is a Short-Term Blip.\u003c/strong\u003e You cite an Iran deal rotation. That’s noise. The long-term trend is clear: Central banks are buying gold. Inflation is sticky. Middle East tensions are a permanent fixture. Gold is in a secular bull market. \u003cstrong\u003eRajesh Exports is a leveraged play on that bull market.\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe \u0026quot;High Prices Hurt Demand\u0026quot; Argument is Myth:\u003c/strong\u003e You\u0026#39;re not a jeweler. In India, gold is a cultural necessity. During Akshaya Tritiya and the wedding season, people buy regardless of price. They adjust carats, they buy less volume, but they \u003cem\u003estill buy\u003c/em\u003e. The revenue surge in TTM shows this. The stock\u0026#39;s value is tied to the \u003cem\u003evalue\u003c/em\u003e of gold, not just the volume of units sold.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e4. The \u0026quot;Value Trap\u0026quot; Fear is Overblown Given the Balance Sheet\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYou point to low ROE and say it\u0026#39;s a value trap. But value traps lack assets and have high debt. Rajesh Exports has the opposite.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBook Value of ₹562 vs. Price of ₹122:\u003c/strong\u003e You know what a 78% discount to book value means? It means even if you took a 50% haircut on their assets, the company would still be worth more than the current stock price. That\u0026#39;s a margin of safety that most investors can only dream of.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNegligible Debt:\u003c/strong\u003e ₹879 Cr against ₹37,369 Cr in assets. They are not at risk of bankruptcy. They have immense financial flexibility.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe \u0026quot;Mysterious\u0026quot; ₹10,750 Cr Investment:\u003c/strong\u003e You call this a risk. I call it a catalyst. What are they investing in? If it’s gold inventory, strategic holdings, or a new venture, the disclosure will be a massive re-rating trigger. The market is pricing this investment at zero. That’s an option for free.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eEngaging the Bear: A Direct Rebuttal\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eBear:\u003c/strong\u003e \u0026quot;The stock is 27% below its 200-day MA. The long-term trend is bearish.\u0026quot;\n\u003cstrong\u003eBull:\u003c/strong\u003e \u0026quot;Agreed. The \u003cem\u003epast\u003c/em\u003e is bearish. But I\u0026#39;m not a historian; I\u0026#39;m an investor. The 200-day MA is a lagging indicator. It reflects the crash. The leading indicators—the 10/50 Golden Cross, the rising RSI from oversold, the Bollinger Band coiling—all point to a trend change. The stock is in a recovery, and the 200-day MA will be reclaimed within the next 2-3 months. You buy when the technicals are \u003cem\u003eawful\u003c/em\u003e and the fundamentals are \u003cem\u003eimproving\u003c/em\u003e. That’s what we have here.\u0026quot;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBear:\u003c/strong\u003e \u0026quot;The margins are near zero. This is a terrible business.\u0026quot;\n\u003cstrong\u003eBull:\u003c/strong\u003e \u0026quot;A terrible business is one with high debt, falling revenue, and unsustainable losses. This business has massive revenue, low debt, and volatile \u003cem\u003ebut sometimes excellent\u003c/em\u003e profits. You are buying a cyclical at the trough of the cycle. The FY23 net profit of ₹1,432 Cr proves the earnings power exists. The FY25 results were a reset. If the company can return to just a 0.20% margin on its current revenue run-rate, you’re looking at a P/E of under 10. The leverage to margin expansion is explosive.\u0026quot;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBear:\u003c/strong\u003e \u0026quot;All the reports say HOLD. This is objectively a risky trade.\u0026quot;\n\u003cstrong\u003eBull:\u003c/strong\u003e \u0026quot;The reports say HOLD because they are reactive, not predictive. They are looking at the wreckage of the crash. We are looking at the rebuilding. \u0026#39;HOLD\u0026#39; is for people who own the stock and are scared. The real opportunity is for those who haven\u0026#39;t bought yet. The risk-reward is heavily skewed to the upside. You have ₹562 of book value for ₹122, a macro tailwind in gold, and a technical setup for a breakout. The risk of this stock going to ₹80 again is far lower than the risk of it going to ₹180 as the gold cycle matures. \u003cstrong\u003eSitting on the sidelines is the riskiest position of all.\u003c/strong\u003e \u0026quot;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFinal Verdict: STRONG BUY\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe bear case is built on fear of what happened yesterday. The bull case is built on the reality of today and the opportunity of tomorrow. The data is clear: deeply undervalued assets, a cyclical earnings recovery, a massive macro tailwind, and a textbook reversal technical setup.\u003c/p\u003e\n\u003cp\u003eStop looking at the crater. Buy the launchpad.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eBear Case\u003c/h2\u003e\n\u003cp\u003eBear Analyst: \u003cstrong\u003eBear Analyst:\u003c/strong\u003e Alright, I appreciate the passion, but let\u0026#39;s stop pretending that a 65% crash followed by a dead-cat bounce is a \u0026quot;textbook reversal.\u0026quot; You\u0026#39;re building an investment thesis on hope, not on data. Let me take your arguments apart one by one, using the same reports you just cited.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e1. The \u0026quot;Cyclical Margin Trough\u0026quot; is a Fantasy\u003c/h3\u003e\n\u003cp\u003eYou say FY25 was an \u0026quot;anomaly\u0026quot;—a deliberate inventory clearance. Let me show you why that\u0026#39;s optimistic spin, not reality.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLook at the trajectory, not a single data point:\u003c/strong\u003e\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003ePeriod\u003c/th\u003e\n\u003cth\u003eOperating Profit Margin\u003c/th\u003e\n\u003cth\u003eTrend\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003eFY21\u003c/td\u003e\n\u003ctd\u003e0.43%\u003c/td\u003e\n\u003ctd\u003e—\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFY22\u003c/td\u003e\n\u003ctd\u003e0.48%\u003c/td\u003e\n\u003ctd\u003eStable\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eFY23\u003c/td\u003e\n\u003ctd\u003e0.48%\u003c/td\u003e\n\u003ctd\u003ePeak\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eFY24\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0.12%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003eCollapse began\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eFY25\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0.04%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003eNear-zero\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eTTM\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e0.04%\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003eStill near-zero\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003eThis isn\u0026#39;t a \u0026quot;kitchen-sinking year.\u0026quot; This is a \u003cstrong\u003ethree-year structural decline\u003c/strong\u003e. FY23 was the outlier, not FY25. The business model is breaking down. Revenue surged 51% in FY25, and net profit \u003cem\u003efell 72%\u003c/em\u003e. That\u0026#39;s not a cleanup—that\u0026#39;s a company that cannot convert its massive scale into profit.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAnd your \u0026quot;Sep 2025 bounce-back\u0026quot; argument?\u003c/strong\u003e Let\u0026#39;s check the context. Sep 2025 net profit was ₹104 Cr. Dec 2025 dropped to ₹71 Cr. That\u0026#39;s not a recovery trajectory—that\u0026#39;s a \u003cstrong\u003edead cat bounce within a downtrend\u003c/strong\u003e. The stock was at ₹80 in March 2026 for a reason.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e2. Your \u0026quot;Textbook Recovery\u0026quot; Technicals are Flawed\u003c/h3\u003e\n\u003cp\u003eYou claim the 10/50 Golden Cross is bullish. Let me explain why that\u0026#39;s actually a \u003cstrong\u003eclassic bear market trap\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe Data Doesn\u0026#39;t Lie:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e200 SMA is at ₹167 and declining.\u003c/strong\u003e The stock is ₹122. That\u0026#39;s \u003cstrong\u003e27% below the long-term trend line\u003c/strong\u003e. Every single major rally in a bear market that fails to reclaim the 200-day MA is eventually sold into. This is not an opinion—it\u0026#39;s statistical probability.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe MACD histogram is flatlining.\u003c/strong\u003e You call it a \u0026quot;rest.\u0026quot; I call it \u003cstrong\u003emomentum exhaustion\u003c/strong\u003e. From March 30 to May 8, the stock rallied 52% in six weeks. That\u0026#39;s a vertical move. The histogram going from +1.15 to +0.026 means buying pressure is evaporating. When the histogram crosses below zero, and the MACD line crosses below the signal line—which is imminent—you\u0026#39;ll get a sell signal that traps the last buyers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Bollinger Squeeze you celebrate is a double-edged sword.\u003c/strong\u003e Yes, breakouts happen from squeezes. But 60% of breakouts are false breakouts on the first attempt. Price is sitting at the middle band, not the upper band. That\u0026#39;s a \u003cstrong\u003eneutral-to-bearish position\u003c/strong\u003e for a squeeze.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eHere\u0026#39;s the honest technical reading:\u003c/strong\u003e The stock had a violent rally from oversold extremes. That\u0026#39;s normal. Now it\u0026#39;s stalling. The next major move—and history says this is 60-65% likely—is a retest of the lower Bollinger Band at ₹112, which aligns with the 50 SMA. If that breaks, you\u0026#39;re back toward ₹80.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e3. The Gold \u0026quot;Super-Cycle\u0026quot; Argument is a Double-Edged Sword\u003c/h3\u003e\n\u003cp\u003eYou claim gold demand is surging. Great. But Rajesh Exports doesn\u0026#39;t \u003cem\u003emine\u003c/em\u003e gold—it \u003cstrong\u003emanufactures and trades\u003c/strong\u003e it. The business model is low-margin, high-volume intermediation.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHere\u0026#39;s the math problem:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGold is at ~$4,800/oz, near all-time highs.\u003c/li\u003e\n\u003cli\u003eRajesh Exports\u0026#39; operating margin is \u003cstrong\u003e0.04%\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eIf gold drops just 5% ($240/oz), the inventory losses will wipe out a full year of profits.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eYou mention \u0026quot;unprecedented demand surge.\u0026quot; I\u0026#39;ll add context: Gold.com reported 41% earnings surprise because they\u0026#39;re a \u003cem\u003eminer\u003c/em\u003e with 40-50% margins. Rajesh Exports is a \u003cem\u003etrader\u003c/em\u003e with 0.04% margins. The leverage is completely different.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAnd the \u0026quot;cultural demand is inelastic\u0026quot; line?\u003c/strong\u003e Partially true. But retail jewelry demand \u003cem\u003edoes\u003c/em\u003e soften at extreme price levels. The World Gold Council has shown that Indian consumers shift to lighter jewelry or outright defer purchases when gold prices rally sharply. The TTM revenue surge you cite is mostly \u003cstrong\u003eprice-driven\u003c/strong\u003e, not volume-driven. If volume is flat or declining, margins get worse—not better.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003e4. The \u0026quot;78% Discount to Book Value\u0026quot; is a Red Flag, Not a Bargain\u003c/h3\u003e\n\u003cp\u003eYou say it\u0026#39;s a deep value buy. I say \u003cstrong\u003ethe market is pricing in a structural impairment of assets\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLet\u0026#39;s ask the hard questions:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBook value is ₹562 per share. The stock trades at ₹122. That\u0026#39;s a 78% discount.\u003c/li\u003e\n\u003cli\u003eWhen has the market consistently been \u003cem\u003ethat\u003c/em\u003e wrong about a stock\u0026#39;s true value for this long?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003ePossible explanations:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe ₹10,750 Cr \u0026quot;investment\u0026quot; you celebrate—no one knows what it is. The market is discounting it because it might be \u003cstrong\u003eilliquid, overvalued, or impaired\u003c/strong\u003e. Until the company provides clarity, you\u0026#39;re paying ₹122 for a mystery asset.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eROE is 0.61%.\u003c/strong\u003e You\u0026#39;re buying assets that generate returns barely above cash. A fair P/B for a 0.6% ROE business is 0.1-0.2x. That\u0026#39;s exactly where the stock trades. The market is \u003cem\u003ecorrect\u003c/em\u003e, not wrong.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNo dividends since FY22.\u003c/strong\u003e Companies trading at deep discounts to book typically at least return capital to shareholders. This one doesn\u0026#39;t. Why? Because management knows the book value is unreliable.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch3\u003e5. Your \u0026quot;Direct Rebuttal\u0026quot; Points are All Wrong\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eYou said:\u003c/strong\u003e \u0026quot;The risk of going to ₹80 is lower than going to ₹180.\u0026quot;\n\u003cstrong\u003eReality check:\u003c/strong\u003e The stock \u003cem\u003ejust\u003c/em\u003e came from ₹80 in March 2026—six weeks ago. It\u0026#39;s already bounced 52%. You\u0026#39;re saying the risk of returning to a level it was just at is low? That\u0026#39;s not how markets work. Sharp rallies in bear markets get retested 70-75% of the time.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eYou said:\u003c/strong\u003e \u0026quot;Sitting on the sidelines is the riskiest position.\u0026quot;\n\u003cstrong\u003eHere\u0026#39;s the truth:\u003c/strong\u003e The riskiest position is buying a stock at ₹122 that has:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e0.04% operating margins\u003c/li\u003e\n\u003cli\u003eNo dividend\u003c/li\u003e\n\u003cli\u003eA declining 200-day moving average at ₹167\u003c/li\u003e\n\u003cli\u003eA MACD that\u0026#39;s about to give a sell signal\u003c/li\u003e\n\u003cli\u003eA balance sheet with unexplained asset jumps\u003c/li\u003e\n\u003cli\u003eNegative EPS in two of the last four quarters\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eYou said:\u003c/strong\u003e \u0026quot;Buy when technicals are awful and fundamentals are improving.\u0026quot;\nFalse premise. The fundamentals are \u003cem\u003enot\u003c/em\u003e improving. TTM net profit is ₹168 Cr. FY23 net profit was ₹1,432 Cr. The company\u0026#39;s earnings power has \u003cstrong\u003edeclined 88% in two years\u003c/strong\u003e. That\u0026#39;s not improvement. That\u0026#39;s destruction.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3\u003eThe Verdict: Why This is a Sell, Not a Buy\u003c/h3\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eFactor\u003c/th\u003e\n\u003cth\u003eYour Claim\u003c/th\u003e\n\u003cth\u003eThe Data Says\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003eMargins\u003c/td\u003e\n\u003ctd\u003eCyclical trough\u003c/td\u003e\n\u003ctd\u003e3-year structural decline\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eTechnicals\u003c/td\u003e\n\u003ctd\u003eReversal setup\u003c/td\u003e\n\u003ctd\u003eMomentum exhaustion at resistance\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eGold macro\u003c/td\u003e\n\u003ctd\u003eTailwind\u003c/td\u003e\n\u003ctd\u003eThreatens demand, compresses margins\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eBook value\u003c/td\u003e\n\u003ctd\u003eMargin of safety\u003c/td\u003e\n\u003ctd\u003eMarket discounting asset impairment\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eEarnings recovery\u003c/td\u003e\n\u003ctd\u003eAlready happening\u003c/td\u003e\n\u003ctd\u003eProfits down 88% from FY23\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003e\u003cstrong\u003eFinal thought:\u003c/strong\u003e You\u0026#39;re buying a business that makes ₹168 Cr in profit on ₹7.4 lakh Cr of revenue. That\u0026#39;s a 0.02% net margin. If they lose just one large export contract, or gold drops 10%, or the RBI changes import duties—all plausible scenarios—the stock doesn\u0026#39;t go to ₹180. It goes to ₹60.\u003c/p\u003e\n\u003cp\u003eYou\u0026#39;re not buying a launchpad. You\u0026#39;re buying a falling knife that briefly bounced off the floor.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRecommendation: SELL or AVOID. The data overwhelmingly supports the bear case.\u003c/strong\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eResearch Manager\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eRecommendation\u003c/strong\u003e: Underweight\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eRationale\u003c/strong\u003e: After carefully weighing both sides of this debate on RAJESHEXPO.NS, I find the bear case carries substantially more weight, though I\u0026#39;m stopping short of a full Sell for reasons I\u0026#39;ll explain.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe bear\u0026#39;s strongest arguments:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe margin trajectory is a 3-year structural decline (0.48% in FY23 → 0.12% in FY24 → 0.04% in FY25/TTM), not a one-time kitchen-sink. Revenue surged 51% in FY25 while net profit fell 72% — that\u0026#39;s a breakdown in the business model\u0026#39;s ability to convert scale into profit.\u003c/li\u003e\n\u003cli\u003eThe technical picture is a bear market rally, not a reversal. The stock is 27% below its declining 200-day MA at ₹167. The MACD histogram flatlining after a 52% vertical bounce signals momentum exhaustion, not consolidation. Bear market rallies retest 70-75% of the time.\u003c/li\u003e\n\u003cli\u003eThe \u0026quot;78% discount to book value\u0026quot; is the market correctly pricing a 0.61% ROE business. Assets that generate returns barely above cash deserve a low P/B multiple. The mysterious ₹10,750 Cr investment with zero disclosure is a real risk, not a free option.\u003c/li\u003e\n\u003cli\u003eNet profit down 88% from FY23 peak is earnings destruction, not a recovery.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eThe bull\u0026#39;s best points:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe balance sheet is genuinely strong — negligible debt, massive assets. This isn\u0026#39;t a bankruptcy risk.\u003c/li\u003e\n\u003cli\u003eGold is in a secular bull market, and Rajesh Exports is a leveraged play on that.\u003c/li\u003e\n\u003cli\u003eThe Sep 2025 quarter did show a bounce-back to ₹104 Cr net profit, and the stock has a lot of book value behind it.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eWhere I land:\u003c/strong\u003e The bull is right that this isn\u0026#39;t a bankruptcy situation, and there IS cyclical earnings power if margins ever normalize. But the bear has the evidence on timing and trajectory. The margin compression is structural in nature (3 years of deterioration), the technicals suggest the bounce is exhausted, and buying at ₹122 when the stock was at ₹80 just six weeks ago creates terrible risk/reward. The recovery thesis requires margins to expand from 0.04% — that\u0026#39;s a hope, not a trend. I\u0026#39;d trim, not exit entirely, because the gold backdrop and book value provide a floor, but the weight of evidence favors caution.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eStrategic Actions\u003c/strong\u003e: 1. \u003cstrong\u003eReduce exposure by 25-40%\u003c/strong\u003e if currently holding a full position. RAJESHEXPO.NS is not a sell-everything situation given the strong balance sheet and gold tailwind, but the risk/reward is unfavorable at current levels.\n2. \u003cstrong\u003eDo not initiate new positions.\u003c/strong\u003e The 52% rally from ₹80 has already happened — buying after that run with margins near zero and momentum exhaustion is poor timing.\n3. \u003cstrong\u003eSet a stop-loss at ₹112\u003c/strong\u003e (the lower Bollinger Band / 50 SMA confluence). If the stock breaks that level, the next stop is likely the March lows around ₹80.\n4. \u003cstrong\u003eWait for confirmation of margin recovery\u003c/strong\u003e before adding. Specifically, wait for two consecutive quarters of operating margin above 0.15% AND for the stock to reclaim and hold above its 200-day MA (currently ₹167 and declining).\n5. \u003cstrong\u003eMonitor the ₹10,750 Cr investment disclosure.\u003c/strong\u003e If the company clarifies this is productive gold inventory or a value-accretive venture, that alone could be a re-rating catalyst worth reconsidering the position.\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"13:T3ea6,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eAggressive\u003c/h2\u003e\n\u003cp\u003eAggressive Analyst: Alright, let’s cut through the cautious whispers and the data dithering. I see the trader’s decision to SELL with a stop-loss at ₹112 and a 25-40% reduction in position, and I say this is the only logical move for anyone who wants to capture alpha rather than park cash in a melting ice cube.\u003c/p\u003e\n\u003cp\u003eLet me address the phantom arguments from the conservative and neutral corners, since I know they’re circling. To the conservative: you’re looking at a stock that crumbled 65% from ₹230 to ₹80, rallied 52% on a single quarter’s hope, and you’re holding on because... what? Because of a “golden cross” on the 10/50 EMA? That’s a short-term technical sugar high. The 200-day MA is at ₹167 and declining—price is still 27% below it. That’s not a recovery, that’s a dead cat bounce with a MACD histogram that’s flattened from +1.15 to +0.026 in a week. The momentum is stalling, and you want to ride that into a bear market retest? The fundamentals back me up: operating profit margin has collapsed from 0.48% to 0.04% over three consecutive years. The Sep 2025 net profit of ₹104 Cr was an outlier—Dec 2025 already slipped back to ₹71 Cr. A single quarter doesn’t reverse a multi-year structural decay. You’re betting on a miracle, not a margin.\u003c/p\u003e\n\u003cp\u003eTo the neutral analyst: you’re sitting on a HOLD, waiting for a Bollinger breakout to confirm direction. That’s passive and dangerous. The Bollinger squeeze you’re watching? It’s at a decision point because the price is exactly at the middle band (₹122), and the bands are narrowing. That means volatility is about to explode. The upper band is at ₹132 (8% upside), but the lower band is at ₹112 (9% downside), and the real support—the 50 SMA at ₹115—is a paltry 6% away. The risk/reward on the upside is capped, but the downside has structural gravity. The long-term trend is bearish, margins are at zero, and the stock is trading at 0.22x book value for a reason. That’s not a discount; it’s a value trap. The market is pricing in asset quality deterioration. If you hold, you’re hoping for a gold price miracle to rescue a broken operating model. Gold at $4,800/oz is a double-edged sword—it boosts revenue but crushes margins. The Samco list of “top gold stocks” is analyst cheerleading, not a catalyst.\u003c/p\u003e\n\u003cp\u003eHere’s where the data must hit home. The TTM net profit margin is 0.02%. That’s not a business; it’s a cash-flow mirage. The FY25 operating cash flow of ₹7,738 Cr looks great until you see the investing outflow of -₹8,301 Cr—that’s inventory shuffling, not earnings. The P/E of 21.4x on such earnings is absurd. You’re paying 21x for a 0.6% ROE. The only thing this stock has going for it is a massive book value of ₹562/share, but if the market won’t even give you 22% of that, it’s telling you the assets are overstated or the earnings power is gone.\u003c/p\u003e\n\u003cp\u003eThe trader’s plan is aggressive because it’s honest. Sell into this rally. Use the ₹112 stop-loss to protect against the 70-75% probability of a retest of the ₹80 lows. The 10-EMA and 50-EMA crossover is a dead-cat bounce, not a trend change. The MACD deceleration is a bearish warning that the momentum has run its course. The ATR at 5.52 and contracting tells us the easy money has been made. The next big move is likely down.\u003c/p\u003e\n\u003cp\u003eThe conservative and neutral views are clinging to hope. I’m clinging to data. Margins don’t lie. A 0.04% operating margin is not a cyclical low—it’s a structural death spiral. Don’t confuse a 52% rally from a crash with a turnaround. It’s a short squeeze, not a renaissance. SELL now, lock in profits, and avoid the whipsaw. The only high-reward play here is the courage to exit before the trap door opens.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eNeutral\u003c/h2\u003e\n\u003cp\u003eNeutral Analyst: I appreciate the passion from both my colleagues, but let me step back and untangle where each of you is letting conviction override clarity. I’m the Neutral Risk Analyst, and my role is to weigh the full picture—not to reject decisive action, but to ensure we don’t confuse a high-conviction narrative with a high-probability outcome. Let’s go point by point.\u003c/p\u003e\n\u003cp\u003eFirst, to the Aggressive Analyst: You’re right that the bear case has strong data—margins in freefall, MACD flattening, price far below the 200-day MA. But you’re overconfident in assigning a 70-75% probability of a bear market retest. That number comes from where? The technical setup is mixed, not overwhelmingly bearish. The 10 EMA crossed above the 50 SMA for the first time since March—that’s a short-term bullish signal, not a dead cat bounce. You call the MACD histogram flattening a “warning,” but ignore that the RSI at 54 still has room to run. A flattening histogram doesn’t guarantee a bearish crossover; it often precedes consolidation before the next leg. Your biggest blind spot is dismissing the Q1 FY26 results catalyst entirely. The Sep 2025 quarter showed a spike to ₹104 Cr net profit. If Q1 FY26 results (released May 8) show further improvement—even modestly—your entire dead-cat bounce thesis weakens. You’re also ignoring the positive read-across from Titan’s 6% surge on strong jewellery demand. That’s not a “fallacy of composition,” it’s a sector-wide theme. Rajesh Exports may have thin margins, but volume recovery benefits both. Your recommendation to sell 25-40% is reasonable for reducing exposure, but you’re too dismissive of the possibility that this rally has legs if gold stays elevated or Q1 exceeds low expectations.\u003c/p\u003e\n\u003cp\u003eNow to the Conservative Analyst: You make the strongest case for outright liquidation, and I respect that you’re prioritizing capital preservation. But you’re exaggerating tail risks without acknowledging the actual risk/reward at current levels. You say the stock could gap down from ₹115 to ₹80 in days again, like in March. But March’s crash was an extraordinary event—a 65% decline over three months during a gold price rout and panic selling. The ATR has contracted from 7.29 to 5.52, volatility is compressing, not expanding. A gap-down of that magnitude requires a new catalyst—like a major gold price crash or catastrophic earnings miss. Gold is near all-time highs, not crashing. The Q1 results could be a surprise, but you assume a negative outcome without evidence. You also ignore that the stock is trading at 0.22x book value—that discount already prices in massive pessimism. If the investment book is truly impaired or governance is rotten, the market would have driven it lower. Instead, it bounced 52% from ₹80. That’s not just a short squeeze; it’s a recognition that the worst-case scenario (liquidation, fraud) didn’t materialize. Your call to sell 100% immediately ignores the opportunity cost and the possibility of a further rally if gold holds or Q1 is decent. A 100% exit is the safest trade, but it locks in losses for those who bought above ₹100 and misses the asymmetric upside if the recovery has more room.\u003c/p\u003e\n\u003cp\u003eHere’s where both of you miss the middle ground. The trader’s proposal to sell 25-40% with a stop-loss at ₹112 is actually quite balanced—it reduces exposure without abandoning the position entirely. But I’d argue it can be refined further. Let me propose a moderate alternative:\u003c/p\u003e\n\u003cp\u003eFirst, acknowledge the macro and fundamental reality: margins are structurally terrible, no denying that. The 0.04% operating margin is not a cyclical blip—it’s a business model challenge. But the 52% rally from ₹80 to ₹122 happened for a reason: gold prices surged, and the market priced in a potential normalization of earnings. The Q1 results are the key. We need to see if the Sep 2025 ₹104 Cr profit was an anomaly or the start of a trend. If Q1 shows, say, ₹80-90 Cr net profit, the bear case weakens. If Q1 disappoints, the rally was indeed a dead cat.\u003c/p\u003e\n\u003cp\u003eSecond, the technical picture is not as binary as either of you suggest. The Bollinger squeeze at the middle band is a genuine decision point. The odds of a 5-8% move in either direction are high, but the direction is not predetermined. The price is at ₹122, with support at the 50 SMA (₹115) and the lower Bollinger band (₹112). Resistance is at the upper band (₹132). The risk/reward for holding is roughly 1:1—8% upside vs 9% downside. That’s not a screaming sell or a compelling buy. It’s a coin flip with a bearish tilt. The conservative analyst says the lower band isn’t the floor, but the ATR contraction suggests the range is tightening, not expanding. A break below ₹115 would be bearish, but we haven’t seen it yet.\u003c/p\u003e\n\u003cp\u003eThird, the gold macro is genuinely supportive in the near term. Gold is at all-time highs, geopolitical tensions in the Middle East persist, and the Fed is on hold—all bullish for gold. A 10% gold correction is possible, but so is a 5% rally. The conservative analyst’s assumption of a 20-30% stock drop on a 10% gold decline is extreme. Rajesh Exports’ correlation to gold is not 2:1; it’s closer to 1:1 when you account for inventory gains and export pricing. A 10% gold drop might lead to a 10-15% stock decline, not 20-30%. The 65% crash was a compound of gold weakness, margin collapse, and panic.\u003c/p\u003e\n\u003cp\u003eSo here’s my balanced adjustment to the trader’s plan: Sell 25-30% of the position now, as the trader suggested, to reduce exposure and lock in some gains from the ₹80-122 rally. But instead of a fixed stop-loss at ₹112, use a trailing stop based on the 50 SMA. If the stock closes below ₹115 (the 50 SMA) on above-average volume, sell an additional 25-30% at market. If it breaks above ₹125 with volume, hold the remaining 40% for a retest of ₹132. This approach acknowledges the bearish fundamentals while giving the recovery rally room to play out. It’s not a full exit, but it’s not a stubborn hold either.\u003c/p\u003e\n\u003cp\u003eThe aggressive analyst is too confident in the bear outcome, ignoring the Q1 catalyst and sector strength. The conservative analyst is too fearful of tail risks that may not materialize, ignoring that the stock already priced in a lot of bad news. The truth is, this stock is a high-risk, high-uncertainty play. A moderate strategy—partial reduction, dynamic stops, and a catalyst-based trigger—offers the best risk/reward. Don’t confuse conviction with probability. Let the data from Q1 and gold price action guide the next move, not a predetermined script.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eConservative\u003c/h2\u003e\n\u003cp\u003eConservative Analyst: As the Conservative Risk Analyst, my mandate is clear: protect capital, minimize downside, and ensure survival over the pursuit of speculative gains. I have reviewed the trader\u0026#39;s decision to SELL with a stop-loss at ₹112 and a 25-40% position reduction, and I must state unequivocally that this is a dangerously inadequate response to the risks present. The trader is correct to identify the bear case, but their proposed action does not go far enough. I will now address the aggressive and neutral analysts directly, because their arguments—while data-rich—neglect the most critical variable: the catastrophic, structural decay of this business.\u003c/p\u003e\n\u003cp\u003eTo the Aggressive Analyst: You call the trader’s plan “honest” and “the only logical move.” I call it reckless half-measures. You correctly identify the 65% crash, the dead-cat bounce, and the collapsing margins. Yet you only propose a 25-40% reduction? That is not risk mitigation; that is a toe-dip in a burning building. If the structural death spiral you yourself describe is real—and I concur it is—then the only prudent action is a full liquidation. A 40% reduction still leaves the firm exposed to a 60% position in a stock trading at 0.22x book value for a reason. That is not a discount; it is a warning that the assets are impaired. The FY25 operating cash flow of ₹7,738 Cr is a mirage, as you note, driven by working capital swings. But you fail to ask: what happens when those swings reverse? The investing outflow of -₹8,301 Cr is not “inventory shuffling”—it is a signal that the company needed to deploy massive capital just to maintain the illusion of revenue. When gold prices correct or trade finance tightens, that cash flow evaporates. The trader’s ₹112 stop-loss is a false comfort. If the stock gaps down below that level—as it did during the March crash when it fell from ₹115 to ₹80 in days—the stop-loss will execute at a far worse price, amplifying losses. The only safe stop-loss is the exit door.\u003c/p\u003e\n\u003cp\u003eTo the Neutral Analyst: You advocate a HOLD, awaiting a Bollinger breakout. This is passive management bordering on negligence. You acknowledge the risk/reward is “unfavorable” with only 8% upside to ₹132 versus 9% downside to ₹112. But that calculation ignores the tail risk. The lower Bollinger Band at ₹112 is not the floor; it is the next stop on a journey to ₹80. The 50 SMA at ₹115 is a fragile support that held for only a few weeks after the March crash. What happens if gold—which you correctly note is at all-time highs near $4,800/oz—corrects 10% on easing Middle East tensions? Rajesh Exports will not merely fall 10%; it will fall 20-30% because its valuation is a pure play on gold price hope. The ATR contraction you cite does not signal an imminent bullish breakout; it signals a coiled spring of volatility that could snap in either direction. Given the long-term downtrend (price 27% below the declining 200 SMA) and the zero-margin business model, the odds overwhelmingly favor a downward snap. A HOLD is a bet that the market will defy structural gravity. That is not analysis; it is wishful thinking.\u003c/p\u003e\n\u003cp\u003eNow, let me focus on the data you both have overlooked. The fundamental report shows an ROE of 0.61% and a ROCE of 1.47%. Compare that to a risk-free government bond yielding 7%. The firm is destroying shareholder value at a rate of over 5% per year in real terms. The book value of ₹562/share is theoretical; the market’s refusal to pay even 22% of that value tells us that auditors may be overstating asset quality. The ₹10,750 Cr surge in investments between FY24 and FY25 is opaque. Are those gold ETFs, inventory, or something less liquid? We do not know. This is a governance risk that cannot be hedged with a stop-loss. The neutral analyst mentions the positive read-across from Titan’s 6% rise. That is a fallacy of composition. Titan has a 12% operating margin and a 25% ROE. Rajesh Exports has 0.04% and 0.61%. They are not peers; they are different species. The positive sentiment from Samco’s gold stock list is noise. Analysts list stocks to generate fees, not to protect your capital.\u003c/p\u003e\n\u003cp\u003eThe social media sentiment report shows gold price volatility and no clear bullish catalyst. The Q1 results coverage is a potential catalyst, but we have no detail yet. Given the history of erratic earnings, the most likely outcome is a negative surprise or, at best, in-line results that fail to justify the current 21.4x P/E. The macro report notes that gold is at all-time highs, supported by Middle East tensions. That is a fragile foundation. Any diplomatic breakthrough will collapse gold and this stock.\u003c/p\u003e\n\u003cp\u003eMy conclusion is clear: the trader’s proposal is a step in the right direction but is insufficient. The firm’s objective is to protect assets and minimize volatility. Therefore, I recommend the following modification: \u003cstrong\u003eSELL 100% of the position immediately.\u003c/strong\u003e Do not wait for ₹112. Do not keep a 60% tail risk. The 52% rally from ₹80 to ₹122 is a gift—a chance to exit with better-than-fair value. There is no growth here, no margin, and no catalyst. There is only a ticking time bomb of structural decay. The aggressive analyst is right about the problem but wrong about the scale of the solution. The neutral analyst is wrong entirely. Protect the capital. Exit now.\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"14:Tc60,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eRating\u003c/strong\u003e: Underweight\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExecutive Summary\u003c/strong\u003e: Reduce RAJESHEXPO.NS exposure by 25-30% immediately, locking in gains from the 52% rally off the March lows. Do not initiate new positions. Set a trailing stop based on the 50 SMA (currently ₹115): if the stock closes below ₹115 on above-average volume, exit a further 25-30%. Hold the remaining 40% through the Q1 FY26 results catalyst (expected around May 8), as a single quarter of sequential improvement could extend the rally toward ₹132. The structural margin decay (0.48% → 0.04% operating margin over three years) warrants caution, but the strong balance sheet (₹562/share book value) and gold\u0026#39;s secular bull market provide a floor that justifies a partial, not complete, exit.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInvestment Thesis\u003c/strong\u003e: The evidence across the analysts\u0026#39; debate converges on a clear risk/reward imbalance, though not a catastrophic one. The bear case carries the weight on trajectory and timing: operating margin has suffered a three-year structural collapse from 0.48% (FY23) to 0.04% (FY25/TTM), with net profit down 88% from its FY23 peak. The stock remains 27% below its declining 200-day MA at ₹167, and the MACD histogram has flattened from +1.15 to +0.026 in a week—classic momentum exhaustion after a 52% vertical bounce. The aggressive analyst correctly flags that the 10/50 EMA crossover is a dead-cat bounce signal in a long-term downtrend, and bear market rallies retest 70-75% of the time.\u003c/p\u003e\n\u003cp\u003eHowever, the neutral analyst persuasively tempers the bear\u0026#39;s certainty. The RSI at 54 has room to run, the Bollinger squeeze at the middle band (₹122) is a genuine decision point, not a predetermined breakdown. The conservative analyst\u0026#39;s call for 100% liquidation overstates tail risk: the ₹80 crash was an extraordinary event tied to panic, not the current low-volatility environment (ATR contracting from 7.29 to 5.52). The conservative analyst\u0026#39;s assumption that a 10% gold correction would trigger a 20-30% stock decline is unsupported—the correlation is closer to 1:1. Further, the stock already prices in massive pessimism at 0.22x book value. The Sep 2025 quarter\u0026#39;s ₹104 Cr net profit and the Q1 FY26 results catalyst (May 8) create asymmetric upside if earnings show sequential improvement, even modestly.\u003c/p\u003e\n\u003cp\u003eThe research manager\u0026#39;s Underweight stance is the correct anchor—trim exposure, don\u0026#39;t exit entirely. The trader\u0026#39;s Sell proposal is directionally correct but too aggressive in scope; the neutral analyst\u0026#39;s refinement to use a trailing stop on the 50 SMA (₹115) rather than a fixed stop at ₹112 is superior, as it adapts to evolving price structure. The conservative analyst\u0026#39;s governance concern around the ₹10,750 Cr undisclosed investment is valid but not yet a crystallization event. The final position: reduce by 25-30% now, trail a stop on the 50 SMA, hold the remainder through Q1 results to let the data—not conviction—determine the next leg.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePrice Target\u003c/strong\u003e: 132.0\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTime Horizon\u003c/strong\u003e: 1-3 months (through Q1 FY26 results)\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"16:[\"id\",\"RAJESHEXPO.NS\",\"d\"]\n1e:[]\n"])</script><script>self.__next_f.push([1,"0:[\"$\",\"$L4\",null,{\"buildId\":\"S0AlHQJ2cBh7UE7u7-J1V\",\"assetPrefix\":\"\",\"urlParts\":[\"\",\"reports\",\"RAJESHEXPO.NS\",\"\"],\"initialTree\":[\"\",{\"children\":[\"reports\",{\"children\":[[\"id\",\"RAJESHEXPO.NS\",\"d\"],{\"children\":[\"__PAGE__?{\\\"id\\\":\\\"RAJESHEXPO.NS\\\"}\",{}]}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[\"reports\",{\"children\":[[\"id\",\"RAJESHEXPO.NS\",\"d\"],{\"children\":[\"__PAGE__\",{},[[\"$L5\",[[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"$6\"}}],[\"$\",\"$L7\",null,{}],[\"$\",\"$L8\",null,{\"ticker\":\"RAJESHEXPO.NS\",\"date\ n and tariff resolution catalysts.\",\"agentVotes\":{\"buy\":1,\"hold\":4,\"sell\":3}},{\"id\":\"WIPRO.NS_20260517_200944\",\"ticker\":\"WIPRO.NS\",\"companyName\":\"Wipro Ltd.\",\"date\":\"May 17, 2026\",\"isoDate\":\"2026-05-17T20:09:44\",\"rating\":\"HOLD\",\"rclass\":\"hold\",\"arrow\":\"—\",\"summary\":\"Maintain existing WIPRO.NS positions and collect the 5.79% dividend yield while awaiting a confirmed directional trigger. For existing holders: hold with a trailing stop at ₹186; if price closes below ₹186 with volume, reduce position by half. For new money: initiate a small 1-2% starter position with a strict stop at ₹180, scaling in further only on a weekly close above the 50 SMA at ₹197.76. Neither accumulate aggressively (aggressive analyst's coiled-spring thesis ignores the failed April bounce and renewed MACD negativity) nor exit entirely (conservative analyst's panic underestimates WIPRO.NS's ₹46,786 Cr investment portfolio and 4x covered dividend). The evidence is genuinely balanced, so capital preservation with a modest carry is the correct stance.\",\"agentVotes\":{\"buy\":1,\"hold\":2,\"sell\":5}},{\"id\":\"NTPC.NS_20260517_200843\",\"ticker\":\"NTPC.NS\",\"companyName\":\"Company Overview\\n\\nNTPC Limited\",\"date\":\"May 17, 2026\",\"isoDate\":\"2026-05-17T20:08:43\",\"rating\":\"SELL\",\"rclass\":\"sell\",\"arrow\":\"▼\",\"summary\":\"Trim 20-30% of the NTPC.NS position at current levels (~₹395), capturing partial profits into short-term technical weakness. Set a hard stop-loss at ₹370 for the remainder to cap downside at 6.3%, while retaining exposure to the structurally intact long-term uptrend. Hold the reduced position through Q4 price reaction, maintaining the 50-SMA at ₹386 as the key dynamic support level to monitor.\",\"agentVotes\":{\"buy\":1,\"hold\":4,\"sell\":3}},{\"id\":\"SUNPHARMA.NS_20260517_200521\",\"ticker\":\"SUNPHARMA.NS\",\"companyName\":\"Sun Pharmaceutical Industries Ltd.\",\"date\":\"May 17, 2026\",\"isoDate\":\"2026-05-17
